<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Profile - Mahindra Gardens</title>
  <link rel="icon" href="logo.jpg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F4F5EC; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadeIn 0.6s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card { width: 100%; max-width: 480px; background: #fff; border: 1px solid #E0E1D8; border-radius: 24px; padding: 36px 40px; box-shadow: 0 8px 40px rgba(0,0,0,0.06); animation: slideUp 0.5s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .logo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .logo-icon { width: 64px; height: 64px; background: #1E4D31; border-radius: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 6px 24px rgba(30,77,49,0.2); }
    .logo-icon img { width: 64px; height: 64px; object-fit: cover; }
    h1 { font-size: 26px; font-weight: 800; color: #111; letter-spacing: -0.5px; text-align: center; }
    .subtitle { font-size: 14px; color: #666; text-align: center; margin-top: 4px; margin-bottom: 28px; }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .input-group input { width: 100%; padding: 14px 18px; background: #fff; border: 1px solid #E0E1D8; border-radius: 50px; font-size: 14px; color: #111; outline: none; transition: all 0.2s; font-family: inherit; }
    .input-group input:focus { border-color: #1E4D31; box-shadow: 0 0 0 3px rgba(30,77,49,0.1); }
    .input-group input::placeholder { color: #aaa; }
    .input-group input:disabled { background: #f5f5f0; color: #888; }
    .input-row { display: flex; gap: 12px; }
    .input-row .input-group { flex: 1; }
    .btn-primary { width: 100%; padding: 16px; background: #1E4D31; border: none; border-radius: 50px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.25s; font-family: inherit; margin-top: 6px; }
    .btn-primary:hover { background: #163d27; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,77,49,0.25); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .skip-link { text-align: center; margin-top: 18px; font-size: 14px; color: #666; }
    .skip-link a { color: #1E4D31; font-weight: 600; text-decoration: none; cursor: pointer; }
    .skip-link a:hover { text-decoration: underline; }
    .message { padding: 12px 16px; border-radius: 12px; font-size: 13px; display: none; text-align: center; margin-bottom: 16px; }
    .message.error { display: block; background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C; }
    .message.success { display: block; background: #F0FDF4; border: 1px solid #BBF7D0; color: #15803D; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><img src="logo.jpg" alt="Mahindra Gardens"></div>
    </div>
    <h1>Complete Your Profile</h1>
    <p class="subtitle">Welcome! Please fill in your residency details to get started.</p>

    <div class="message" id="message"></div>

    <form id="profileForm">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="displayName" disabled>
      </div>
      <div class="input-group">
        <label>Flat Number *</label>
        <input type="text" id="flatNumber" placeholder="e.g. A-101" required>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>Occupation</label>
          <input type="text" id="occupation" placeholder="e.g. Engineer">
        </div>
        <div class="input-group">
          <label>Family Members</label>
          <input type="number" id="familyMembers" placeholder="e.g. 3" min="1" value="1">
        </div>
      </div>
      <div class="input-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="e.g. 9876543210">
      </div>
      <button type="submit" class="btn-primary">Save & Continue</button>
    </form>

    <div class="skip-link"><a id="skipLink">Skip for now — I'll fill later</a></div>
  </div>

  <script>
    const API = 'http://localhost:5000/api';
    const user = JSON.parse(sessionStorage.getItem('user'));

    if (!user) {
      window.location.href = 'login.html';
    }

    if (user.role !== 'resident') {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('displayName').value = user.name || '';

    document.getElementById('profileForm').addEventListener('submit', async e => {
      e.preventDefault();
      const flatNumber = document.getElementById('flatNumber').value.trim();
      const occupation = document.getElementById('occupation').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const familyMembers = parseInt(document.getElementById('familyMembers').value) || 1;

      if (!flatNumber) {
        showMsg('Flat number is required.', 'error');
        return;
      }

      const btn = document.querySelector('#profileForm .btn-primary');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const res = await fetch(API + '/resident/' + user.id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ flat_number: flatNumber, occupation, phone, family_members: familyMembers })
        });
        const data = await res.json();
        if (data.ok) {
          showMsg('Profile saved! Redirecting...', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        } else {
          showMsg(data.error || 'Failed to save profile.', 'error');
        }
      } catch {
        showMsg('Could not connect to server.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save & Continue';
      }
    });

    document.getElementById('skipLink').addEventListener('click', e => {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    });

    function showMsg(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
    }
  </script>
</body>
</html>
